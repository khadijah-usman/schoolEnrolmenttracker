{% extends 'base.html' %}
{% block title %}New Enquiry{% endblock %}

{% block content %}

<div class="page-hd">
  <div class="page-hd-left">
    <div class="d-flex align-items-center gap-3">
      <a href="{{ url_for('admissions') }}" class="icon-btn">
        <i class="bi bi-arrow-left"></i>
      </a>
      <div>
        <h1>New Enquiry</h1>
        <p class="page-sub">Student will be placed at the <strong>Enquiry</strong> stage</p>
      </div>
    </div>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-12 col-xl-9">
    <form method="post">

      <!-- Child Information -->
      <div class="card mb-4">
        <div class="card-header">
          <i class="bi bi-person-badge-fill" style="color:#6366f1;"></i>
          Child's Information
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">Full Name <span class="text-danger">*</span></label>
              <input type="text" name="child_name" class="form-control" required
                     placeholder="e.g. Emeka Okafor">
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label">Date of Birth</label>
              <input type="date" name="date_of_birth" class="form-control">
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label">Gender</label>
              <select name="gender" class="form-select">
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Class Applying For <span class="text-danger">*</span></label>
              <select name="class_applying" class="form-select" required>
                <option value="">Select class</option>
                {% for cls in classes_list %}
                <option value="{{ cls }}">{{ cls }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Academic Year</label>
              <select name="academic_year" class="form-select">
                <option value="">Select year</option>
                {% for y in academic_years %}
                <option value="{{ y }}">{{ y }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Previous School</label>
              <input type="text" name="previous_school" class="form-control"
                     placeholder="e.g. Bright Stars Academy">
            </div>
            <div class="col-12">
              <label class="form-label">Home Address</label>
              <input type="text" name="address" class="form-control"
                     placeholder="Full residential address">
            </div>
          </div>
        </div>
      </div>

      <!-- Primary Parent -->
      <div class="card mb-4">
        <div class="card-header">
          <i class="bi bi-people-fill" style="color:#10b981;"></i>
          Primary Parent / Guardian
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-12 col-md-4">
              <label class="form-label">Full Name <span class="text-danger">*</span></label>
              <input type="text" name="parent_name" class="form-control" required
                     placeholder="e.g. Mr. Chukwuemeka Okafor">
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Phone Number</label>
              <input type="text" name="parent_phone" class="form-control"
                     placeholder="+234 …">
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Email Address</label>
              <input type="email" name="parent_email" class="form-control"
                     placeholder="email@example.com">
            </div>
          </div>
        </div>
      </div>

      <!-- Second Parent -->
      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center" style="flex-direction:row;">
          <span>
            <i class="bi bi-person-plus" style="color:#f59e0b;"></i>
            Second Parent / Guardian
          </span>
          <span style="font-size:.68rem;font-weight:500;color:var(--text-4);text-transform:none;letter-spacing:0;">Optional</span>
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">Full Name</label>
              <input type="text" name="second_parent_name" class="form-control"
                     placeholder="e.g. Mrs. Ada Okafor">
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">Phone Number</label>
              <input type="text" name="second_parent_phone" class="form-control"
                     placeholder="+234 …">
            </div>
          </div>
        </div>
      </div>

      <!-- Notes -->
      <div class="card mb-5">
        <div class="card-header">
          <i class="bi bi-journal-text" style="color:#64748b;"></i>
          Notes
        </div>
        <div class="card-body">
          <textarea name="notes" class="form-control" rows="3"
                    placeholder="Any additional notes about this enquiry…"></textarea>
        </div>
      </div>

      <div class="d-flex gap-3">
        <button type="submit" class="btn btn-primary px-5">
          <i class="bi bi-person-check-fill"></i> Save Enquiry
        </button>
        <a href="{{ url_for('admissions') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>

    </form>
  </div>
</div>

{% endblock %}
