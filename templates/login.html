<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f0f2f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 24px 16px;
    }
    .login-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      color: #fff;
      margin: 0 auto 20px;
    }
    .icon-admin   { background: #4f46e5; }
    .icon-uniform { background: #0369a1; }

    h1 {
      font-size: 1.3rem;
      font-weight: 800;
      color: #111827;
      letter-spacing: -.03em;
      text-align: center;
      margin-bottom: 4px;
    }
    .sub {
      font-size: .78rem;
      color: #9ca3af;
      text-align: center;
      margin-bottom: 28px;
    }
    .card {
      background: #fff;
      border: 1px solid #e4e7ed;
      border-radius: 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
      padding: 28px 28px;
    }
    label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 5px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: .85rem;
      pointer-events: none;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1.5px solid #e4e7ed;
      border-radius: 8px;
      font-size: .85rem;
      font-family: inherit;
      color: #111827;
      background: #fff;
      transition: border-color .14s, box-shadow .14s;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }
    .btn-login {
      width: 100%;
      margin-top: 18px;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      transition: all .14s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-admin   { background: #4f46e5; box-shadow: 0 2px 8px rgba(79,70,229,.3); }
    .btn-admin:hover   { background: #4338ca; }
    .btn-uniform { background: #0369a1; box-shadow: 0 2px 8px rgba(3,105,161,.3); }
    .btn-uniform:hover { background: #075985; }

    .alert {
      background: #fee2e2;
      color: #7f1d1d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .8rem;
      font-weight: 500;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .other-link {
      text-align: center;
      margin-top: 20px;
      font-size: .75rem;
      color: #9ca3af;
    }
    .other-link a { color: #4f46e5; font-weight: 600; text-decoration: none; }
    .other-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">

    <div class="login-icon {% if role == 'admin' %}icon-admin{% else %}icon-uniform{% endif %}">
      <i class="bi bi-{% if role == 'admin' %}mortarboard-fill{% else %}bag-fill{% endif %}"></i>
    </div>

    <h1>{{ title }}</h1>
    <p class="sub">{{ subtitle }}</p>

    <div class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert">
            <i class="bi bi-exclamation-circle-fill"></i> {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="post">
        <label for="passcode">Passcode</label>
        <div class="input-wrap">
          <i class="bi bi-lock-fill"></i>
          <input type="password" id="passcode" name="passcode"
                 placeholder="Enter passcode" autofocus autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login {% if role == 'admin' %}btn-admin{% else %}btn-uniform{% endif %}">
          <i class="bi bi-arrow-right-circle-fill"></i>
          Sign In
        </button>
      </form>
    </div>

    <div class="other-link">
      {% if role == 'admin' %}
        Uniform Officer? <a href="{{ url_for('uniform_login') }}">Go to Uniform section</a>
      {% else %}
        Admissions staff? <a href="{{ url_for('admin_login') }}">Go to Admissions</a>
      {% endif %}
    </div>

  </div>
</body>
</html>
